name: Smoke Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Run smoke-test.ps1
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run local smoke test
        shell: pwsh
        run: ./smoke-test.ps1
